<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Villa San Rocco del Belvedere | Opening Soon</title>
  <style>
    :root {
      --bg-dark: #0f0f12;
      --gold: #c9a86a;
      --off-white: #f4f1ea;
      --muted: #d5cec2;
      --glass: rgba(20, 20, 24, 0.55);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Didot", "Bodoni MT", "Times New Roman", serif;
      color: var(--off-white);
      background: radial-gradient(circle at top, #1d1c23 0%, var(--bg-dark) 55%, #08090b 100%);
      display: grid;
      place-items: center;
      padding: 14px;
    }

    .page {
      width: min(1100px, 100%);
      height: min(94vh, 900px);
      display: grid;
      grid-template-rows: auto 1fr;
      background: linear-gradient(140deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(201, 168, 106, 0.35);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
    }

    .hero {
      padding: 30px 20px 18px;
      text-align: center;
      background: linear-gradient(to bottom, rgba(15, 15, 20, 0.8), var(--glass));
    }

    .eyebrow {
      letter-spacing: 0.35em;
      text-transform: uppercase;
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 0.72rem;
      color: var(--gold);
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.8rem);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .sub {
      margin: 12px auto 0;
      max-width: 900px;
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: clamp(0.95rem, 1.8vw, 1.12rem);
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .carousel {
      position: relative;
      width: 100%;
      min-height: 0;
      background: #000;
      overflow: hidden;
    }

    .track {
      height: 100%;
      width: 100%;
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: scale(1.03);
      transition: opacity 0.9s ease, transform 6s linear;
      background-position: center;
      background-size: cover;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1);
      z-index: 2;
    }

    .controls {
      position: absolute;
      inset: auto 0 14px 0;
      z-index: 3;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.65);
      background: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .dot.active {
      background: var(--gold);
      transform: scale(1.12);
      border-color: var(--gold);
    }

    @media (max-width: 680px) {
      body {
        padding: 6px;
      }

      .page {
        height: 100dvh;
        width: 100%;
        border-radius: 12px;
      }

      .hero {
        padding: 22px 14px 14px;
      }

      .eyebrow {
        font-size: 0.63rem;
        letter-spacing: 0.24em;
        margin-bottom: 10px;
      }

      h1 {
        font-size: clamp(1.45rem, 8.5vw, 2.05rem);
        line-height: 1.1;
      }

      .sub {
        margin-top: 8px;
        font-size: 0.9rem;
        letter-spacing: 0.08em;
      }

      .controls {
        inset: auto 0 10px 0;
        gap: 12px;
      }

      .dot {
        width: 14px;
        height: 14px;
      }
    }

    @media (max-width: 400px) {
      .hero {
        padding: 18px 12px 10px;
      }

      h1 {
        font-size: clamp(1.3rem, 9vw, 1.7rem);
      }

      .sub {
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">Villa San Rocco del Belvedere</div>
      <h1>The Heart of Tuscany</h1>
      <p class="sub">Opening Soon</p>
    </section>

    <section class="carousel" aria-label="Villa image carousel">
      <div class="track" id="track"></div>
      <div class="controls" id="controls" aria-label="Carousel controls"></div>
    </section>
  </main>

  <script>
    const imagePaths = [
      "Photos-3-001/20210718_185712.jpg",
      "Photos-3-001/20220615_205032.jpg",
      "Photos-3-001/20220616_172730.jpg",
      "Photos-3-001/20220616_175845.jpg",
      "Photos-3-001/20220616_204919.jpg",
      "Photos-3-001/20220616_234349.jpg",
      "Photos-3-001/20220719_202746.jpg",
      "Photos-3-001/20220906_112746.jpg",
      "Photos-3-001/20220907_193040.jpg",
      "Photos-3-001/20220909_172414.jpg",
      "Photos-3-001/20220909_173826.jpg",
      "Photos-3-001/20220909_173843.jpg",
      "Photos-3-001/20220909_174456.jpg",
      "Photos-3-001/20220910_190356.jpg"
    ];

    const track = document.getElementById("track");
    const controls = document.getElementById("controls");
    let current = 0;
    let timer;

    imagePaths.forEach((src, i) => {
      const slide = document.createElement("div");
      slide.className = "slide";
      if (i === 0) {
        slide.classList.add("active");
      }
      slide.style.backgroundImage = `url("${src}")`;
      track.appendChild(slide);

      const dot = document.createElement("button");
      dot.type = "button";
      dot.className = "dot";
      dot.setAttribute("aria-label", `Go to slide ${i + 1}`);
      if (i === 0) {
        dot.classList.add("active");
      }
      dot.addEventListener("click", () => {
        show(i);
        restart();
      });
      controls.appendChild(dot);
    });

    const slides = Array.from(document.querySelectorAll(".slide"));
    const dots = Array.from(document.querySelectorAll(".dot"));

    function show(index) {
      slides[current].classList.remove("active");
      dots[current].classList.remove("active");
      current = index;
      slides[current].classList.add("active");
      dots[current].classList.add("active");
    }

    function next() {
      const nxt = (current + 1) % slides.length;
      show(nxt);
    }

    function restart() {
      clearInterval(timer);
      timer = setInterval(next, 4000);
    }

    restart();
  </script>
</body>
</html>
